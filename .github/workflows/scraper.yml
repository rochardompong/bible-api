name: Hybrid Bible Scraper Phase 1

on:
  schedule:
    # Run every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      target:
        description: 'What to scrape'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - languages
          - bibles
          - books
          - chapters
          - votd
      bible_id:
        description: 'Specific Bible ID to re-scrape (optional)'
        required: false
        type: string

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run Scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          YOUVERSION_API_KEY: ${{ secrets.YOUVERSION_API_KEY }}
          PRIORITY_LANGUAGES: "ENG,IND" # English and Indonesia as requested
          SCRAPE_TARGET: ${{ github.event.inputs.target || 'all' }}
          TARGET_BIBLE_ID: ${{ github.event.inputs.bible_id || '' }}
        run: pnpm --filter scraper run start
