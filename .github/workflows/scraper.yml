name: Bible Mirror Scraper

on:
  # Run every 8 hours automatically
  schedule:
    - cron: "0 0,8,16 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      reset_progress:
        description: "Reset progress state and start from scratch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scrape:
    name: Scrape YouVersion Bible Data
    runs-on: ubuntu-latest
    timeout-minutes: 55  # Stay well under the 6h Actions limit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build scraper
        run: pnpm scraper:build

      - name: Reset progress (if requested)
        if: ${{ github.event.inputs.reset_progress == 'true' }}
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          echo "Resetting progress state..."
          node -e "
            const { S3Client, DeleteObjectCommand } = require('@aws-sdk/client-s3');
            const s3 = new S3Client({
              region: 'auto',
              endpoint: 'https://' + process.env.R2_ACCOUNT_ID + '.r2.cloudflarestorage.com',
              credentials: {
                accessKeyId: process.env.R2_ACCESS_KEY_ID,
                secretAccessKey: process.env.R2_SECRET_ACCESS_KEY,
              }
            });
            s3.send(new DeleteObjectCommand({ Bucket: process.env.R2_BUCKET_NAME, Key: 'state/progress.json' }))
              .then(() => console.log('Progress reset.'))
              .catch(console.error);
          "

      - name: Run scraper
        env:
          YV_APP_KEY: ${{ secrets.YV_APP_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          NODE_ENV: production
        run: pnpm scraper:run

      - name: Report status
        if: always()
        run: |
          echo "Scraper session complete at $(date -u)"
